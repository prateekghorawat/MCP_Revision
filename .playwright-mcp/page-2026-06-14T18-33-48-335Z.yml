                      - text: "#Gebäudemodernisierungsgesetz"
                    - text: "verfestigt die Bundesregierung fossile Abhängigkeiten, statt die Wärmewende verlässlich, bezahlbar und klimaneutral auszurichten. Der Entwurf setzt Fehlanreize, die erhebliche volkswirtschaftliche Risiken bergen: Kosten werden in die Zukunft verschoben, Investitionen verunsichert und Haushalte ebenso wie Unternehmen langfristig belastet. Gleichzeitig verliert der Gebäudesektor seinen klaren Klimapfad. In dieser Ausgestaltung droht das Gesetz, die Wärmewende unnötig teuer und ineffizient zu machen. Es öffnet neue Spielräume für fossile Lösungen – mit erheblichen Folgen für Wohlstand, Wettbewerbsfähigkeit und Klimaziele. Was es jetzt braucht: ▪️ eine ambitionierte, klimazielkonforme Biotreppe ▪️ gleichlaufende Anforderungen für Ersatzmaßnahmen ▪️ eine planbare und effiziente Förderkulisse ▪️ die konsequente Berücksichtigung des ETS II ▪️ echte Technologieoffenheit ohne fossile Hintertüren Die Bundesregierung muss nachschärfen. Nur so kann das"
