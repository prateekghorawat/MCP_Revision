                    - text: "in Dahlewitz (Brandenburg) ein Schulungszentrum für dezentrale Energielösungen aufgebaut, das größte seiner Art in Europa. Seitdem wurden dort über 4.000 Fach- und Hilfskräfte für Photovoltaik und Wärmepumpen qualifiziert. Jetzt gehen wir den nächsten Schritt: 🤝🏗️ Wir öffnen unsere Trainingskapazitäten auch für externe Handwerks- und Partnerbetriebe. Die Academy bietet fünf praxisnahe Programme rund um Installation und Wartung mit erfahrenen Ausbilder:innen, auf modernsten Trainingsflächen und Einsätzen auf realen Baustellen. 🌐📜 Parallel bauen wir unser internationales Fachkräfteprogramm für Elektriker:innen aus. Rund 500 Elektriker:innen aus Kolumbien sollen allein in diesem Jahr in der Academy eine IHK-anerkannte, sechsmonatige Weiterbildung für den deutschen Arbeitsmarkt absolvieren. Im Rahmen des Programms erhalten die internationalen Fachkräfte fachspezifische Deutschkurse, Integrationsangebote sowie Unterstützung bei Visa- und, sowie bei Bedarf auch bei Führerschein, Versicherung, Wohnung und Familiennachzug. Mehr dazu in unserer Pressemitteilung:"
