        - generic [ref=e92]:
          - heading [level=2] [ref=e93]: About us
          - generic [ref=e94]:
            - paragraph [ref=e95]: "Enpal is Europe's leading new energy company. We are building the energy infrastructure of the future: smart, connected, decentralized, sustainable, and innovative. We offer a fully integrated energy system consisting of a solar power system, battery storage, a wall box, a smart meter, and a heat pump. These components are connected via the AI-supported Enpal.One+ platform, forming an intelligent, decentralized, high-performance energy network. Enpal.One+ connects tens of thousands of storage units, directly connecting households and businesses with the electricity market. This enables real-time optimization of electricity procurement and feed-in, creating an energy system that is cheaper, more stable, and more efficient than traditional structures. Over 115,000 customers are already part of this networked energy future. Their installed systems have a combined output of around one gigawatt, comparable to a conventional large-scale power plant."
