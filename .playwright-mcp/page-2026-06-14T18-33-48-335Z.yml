                    - button [ref=e174] [cursor=pointer]
                  - paragraph [ref=e176]: "Heute startet die 1. Lesung des Gebäudemodernisierungsgesetzes (GModG) im Bundestag. Die Novelle wird entscheidend dafür sein, ob die Wärmewende kosteneffizient, resilient und klimaneutral gelingt. Die Wärmewende steht an einem kritischen Punkt: Noch immer drohen politische Fehlanreize, die Verbraucher langfristig mit höheren Energiekosten belasten und Investitionen in moderne Heiztechnologien ausbremsen. Gleichzeitig entscheidet sich jetzt, ob Deutschland einen klimaneutralen und wettbewerbsfähigen Wärmemarkt schafft oder neue fossile Abhängigkeiten für Jahrzehnte zementiert. Aus Sicht von Enpal sollte das Gesetz vier zentrale Prinzipien verfolgen, damit Verbraucher nicht in die Kostenfalle geraten, Betriebe Planungsunsicherheit erhalten und die Klimaziele erreicht werden: 1. Klimaziele sichern statt fossile Lock-ins verlängern Die Biotreppe und Ersatzmaßnahmen müssen konsequent an realen Emissionsminderungen ausgerichtet werden. Hybrid- und andere Übergangslösungen dürfen nicht dazu führen, dass fossile Heizsysteme dauerhaft fortgeführt werden. Das Betriebsverbot für fossile Heizungen ab 2045 muss Bestand haben. 2. Förderung planbar weiterentwickeln Die Förderung muss - wie angekündigt - bis 2029 stabil bleiben und nicht sprunghaft gekürzt werden. Verbraucher, Handwerk und Industrie brauchen Investitionssicherheit. Öffentliche Mittel sollten dort eingesetzt werden, wo sie die größte Klimawirkung und Systemeffizienz entfalten. 3. ETS II konsequent berücksichtigen Mit dem europäischen Emissionshandel werden fossile Energieträger in den kommenden Jahren schrittweise teurer. Regulierung und Förderung sollten diese Entwicklung unterstützen – nicht konterkarieren. Wer heute neue fossile Pfade eröffnet, schafft die Kostenprobleme von morgen. 4. Technologieoffenheit richtig verstehen Technologieoffenheit bedeutet Wettbewerb zwischen klimaneutralen Lösungen – etwa Wärmepumpen, Gebäudenetzen und Fernwärme. Sie bedeutet nicht die Privilegierung fossiler Technologien oder pauschale Anschlusszwänge. Verbraucherinnen und Verbraucher sollten die wirtschaftlich und technisch beste klimaneutrale Lösung wählen können. Das GModG kann ein echtes Modernisierungsgesetz werden – für Klimaschutz, bezahlbare Energie und wirtschaftliches Wachstum. Dafür braucht es jetzt die richtigen Weichenstellungen im parlamentarischen Verfahren."
