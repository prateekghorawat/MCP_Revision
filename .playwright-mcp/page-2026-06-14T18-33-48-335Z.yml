                  - paragraph [ref=e577]:
                    - text: Gemeinsam mit vielen weiteren Akteuren appellieren wir an die Bundesnetzagentur und werben für mutige Reformen, endlich mehr
                    - link [ref=e578] [cursor=pointer]:
                      - /url: https://www.linkedin.com/signup/cold-join?session_redirect=https%3A%2F%2Fwww.linkedin.com%2Ffeed%2Fhashtag%2FflexibilitAeut&trk=organization_guest_main-feed-card-text
                      - text: "#Flexibilität"
                    - text: im Netz, und weniger Kosten für das Netz. Der
                    - link [ref=e579] [cursor=pointer]:
                      - /url: https://www.linkedin.com/signup/cold-join?session_redirect=https%3A%2F%2Fwww.linkedin.com%2Ffeed%2Fhashtag%2Fnetzausbau&trk=organization_guest_main-feed-card-text
                      - text: "#Netzausbau"
                    - text: "bis 2045 kostet bis zu 700 Mrd. Euro. Ein Drittel davon entfällt auf die Niederspannung – dort, wo über 90 % der Verbraucher angeschlossen sind. Gleichzeitig liegen dort über 200 GW flexible Leistung aus Speichern, E‑Autos und Wärmepumpen. Dieses Potenzial muss endlich systematisch genutzt werden. Unsere Forderungen: 1️⃣ Preissignale für alle, von Anfang an: Auch Haushalte sollten frühzeitig von zeitlich unterschiedlichen Netzentgelten profitieren, die zeigen, wann Strom das Netz besonders belastet und wann nicht. 2️⃣ Flexibilität auch im Wohnquartier nutzen: Haushalte können helfen, Netze zu entlasten. Dafür müssen zeitvariable Netzentgelte nach § 14a EnWG in der Niederspannung wirklich überall umgesetzt werden. 3️⃣ Mehr Anreiz, weniger Kupfer: Netzentgelte sollten nicht nur heutige Engpässe lösen, sondern auch teuren Netzausbau vermeiden. Das spart Milliarden. 4️⃣ Weg von pauschalen Grundpreisen: Gleiche Fixpreise für kleine Wohnungen und große Bürogebäude sind nicht gerecht. Entscheidend sollte sein, wann und wie Strom genutzt wird – nicht ein fixer Sockelbetrag. 5️⃣ Faire Regeln für Solaranlagen & Speicher: Eine Solaranlage darf kein Kostennachteil sein. Wer flexibel ist, sollte über dynamische Preise belohnt – nicht über pauschale Aufschläge bestraft werden. 6️⃣ Kapazitätspreise mit Augenmaß: Kapazitätsentgelte können helfen, dürfen aber nicht dazu führen, dass Preissignale wirkungslos werden. Sonst reagieren Kunden nicht mehr auf Engpässe. 7️⃣ Klare Regeln bei Baukosten: Ein Prosumer, der bereits einen Netzanschluss hat, darf nicht doppelt zur Kasse gebeten werden. Hier braucht es klare Leitplanken für Netzbetreiber. Unser Appell: Dynamische, faire"
                    - link [ref=e580] [cursor=pointer]:
                      - /url: https://www.linkedin.com/signup/cold-join?session_redirect=https%3A%2F%2Fwww.linkedin.com%2Ffeed%2Fhashtag%2Fnetzentgelte&trk=organization_guest_main-feed-card-text
                      - text: "#Netzentgelte"
                    - text: sind der Schlüssel zu sicheren Netzen, bezahlbarem Strom und einer erfolgreichen Energiewende.
